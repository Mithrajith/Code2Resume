<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resumes - Code2Resume</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 32px;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .resumes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .resume-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .resume-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .resume-card .date {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .resume-card .title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resume-card .description {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resume-card .filename {
            font-size: 13px;
            color: #4b5563;
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resume-card .actions {
            display: flex;
            gap: 10px;
        }

        .resume-card button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-download {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-download:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
            flex: 0.4;
        }

        .btn-delete:hover {
            background: #fecaca;
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .empty-state h2 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 12px;
        }

        .empty-state p {
            color: #6b7280;
            margin-bottom: 24px;
        }

        .empty-state button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .empty-state button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 18px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-content .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-content .close:hover {
            color: #374151;
        }

        .modal-content h2 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 12px;
        }

        .modal-content .modal-date {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .modal-content .modal-description {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.7;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .modal-content .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .resumes-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .nav-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 My Resumes</h1>
            <p>View and manage all your generated resumes</p>
            <div class="nav-buttons">
                <button class="btn-primary" onclick="goToDashboard()">🏠 Dashboard</button>
                <button class="btn-secondary" onclick="goToSettings()">⚙️ Settings</button>
                <button class="btn-secondary" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div id="loading" class="loading">
            Loading your resumes...
        </div>

        <div id="resumesContainer" class="resumes-grid" style="display: none;">
            <!-- Resume cards will be inserted here -->
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>📭 No Resumes Yet</h2>
            <p>You haven't generated any resumes yet. Start a conversation with the AI to create your first resume!</p>
            <button onclick="goToDashboard()">Go to Dashboard</button>
        </div>
    </div>

    <!-- Modal for resume details -->
    <div id="resumeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div class="modal-date" id="modalDate"></div>
            <div class="modal-description" id="modalDescription"></div>
            <div class="filename" id="modalFilename"></div>
            <div class="modal-actions">
                <button class="btn-download" onclick="downloadCurrentResume()">
                    📥 Download Resume
                </button>
                <button class="btn-delete" onclick="deleteCurrentResume()">
                    🗑️ Delete
                </button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        let resumes = [];
        let currentResumeId = null;

        async function loadResumes() {
            try {
                const response = await fetch('/resumes', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load resumes');
                }

                resumes = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                if (resumes.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    document.getElementById('resumesContainer').style.display = 'grid';
                    renderResumes();
                }
            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <p style="color: #fca5a5;">❌ Error loading resumes: ${e.message}</p>
                `;
            }
        }

        function renderResumes() {
            const container = document.getElementById('resumesContainer');
            container.innerHTML = resumes.map((resume, index) => `
                <div class="resume-card" onclick="openModal(${index})">
                    <div class="date">
                        🕒 ${formatDate(resume.created_at)}
                    </div>
                    <div class="title">${truncate(resume.query, 60)}</div>
                    <div class="description">${truncate(resume.query, 150)}</div>
                    <div class="filename">
                        📄 ${resume.filename}
                    </div>
                    <div class="actions" onclick="event.stopPropagation()">
                        <button class="btn-download" onclick="downloadResume('${resume.filename}')">
                            📥 Download
                        </button>
                        <button class="btn-delete" onclick="deleteResume(${index})">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const resume = resumes[index];
            currentResumeId = index;
            
            document.getElementById('modalTitle').textContent = truncate(resume.query, 80);
            document.getElementById('modalDate').textContent = '🕒 ' + formatDate(resume.created_at);
            document.getElementById('modalDescription').textContent = resume.query;
            document.getElementById('modalFilename').innerHTML = `📄 ${resume.filename}`;
            
            document.getElementById('resumeModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('resumeModal').classList.remove('active');
            currentResumeId = null;
        }

        async function downloadResume(filename) {
            try {
                const response = await fetch(`/download-resume/${filename}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (e) {
                alert('Error downloading resume: ' + e.message);
            }
        }

        async function downloadCurrentResume() {
            if (currentResumeId !== null) {
                await downloadResume(resumes[currentResumeId].filename);
            }
        }

        async function deleteResume(index) {
            if (!confirm('Are you sure you want to delete this resume?')) return;

            const resume = resumes[index];
            
            try {
                const response = await fetch(`/delete-resume/${resume.filename}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Delete failed');

                resumes.splice(index, 1);
                
                if (resumes.length === 0) {
                    document.getElementById('resumesContainer').style.display = 'none';
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    renderResumes();
                }

                closeModal();
            } catch (e) {
                alert('Error deleting resume: ' + e.message);
            }
        }

        async function deleteCurrentResume() {
            if (currentResumeId !== null) {
                await deleteResume(currentResumeId);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min${diffMins > 1 ? 's' : ''} ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function truncate(text, maxLength) {
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        function goToDashboard() {
            window.location.href = '/dashboard';
        }

        function goToSettings() {
            window.location.href = '/settings';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on outside click
        document.getElementById('resumeModal').addEventListener('click', (e) => {
            if (e.target.id === 'resumeModal') closeModal();
        });

        // Load resumes on page load
        loadResumes();
    </script>
</body>
</html>
