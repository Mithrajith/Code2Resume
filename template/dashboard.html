<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Code2Resume</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb; /* Solid Blue */
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --sidebar-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --chat-bg: #ffffff;
            --user-msg-bg: #2563eb;
            --user-msg-text: #ffffff;
            --agent-msg-bg: #f3f4f6;
            --agent-msg-text: #1f2937;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-color);
        }

        /* Header */
        header { 
            background: #111827; 
            color: white; 
            padding: 0 24px; 
            height: 60px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.025em; }
        nav a { color: #d1d5db; text-decoration: none; margin-left: 24px; font-size: 14px; transition: color 0.2s; }
        nav a:hover { color: white; }
        
        /* Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-section:last-child { border-bottom: none; }

        .sidebar h2 { 
            margin-top: 0; 
            margin-bottom: 12px;
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: #6b7280; 
            font-weight: 600;
        }

        .sidebar p { font-size: 13px; color: #4b5563; margin-bottom: 16px; line-height: 1.5; }
        
        /* Buttons */
        button.primary { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 14px; 
            font-weight: 500;
            transition: background-color 0.2s;
        }
        button.primary:hover { background: var(--primary-hover); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }

        /* Chat Area */
        .content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: white;
            position: relative;
        }
        
        .chat-box { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-history { 
            flex: 1; 
            padding: 24px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Messages */
        .message { 
            display: flex; 
            gap: 16px; 
            max-width: 100%;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .message.user { 
            flex-direction: row-reverse; 
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.agent .avatar { background: #10b981; color: white; } /* Green for AI */
        .message.user .avatar { background: #6366f1; color: white; } /* Indigo for User */

        .message-content {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message.agent .message-content { 
            background: var(--agent-msg-bg); 
            color: var(--agent-msg-text); 
            border-top-left-radius: 0;
        }
        
        .message.user .message-content { 
            background: var(--user-msg-bg); 
            color: var(--user-msg-text); 
            border-top-right-radius: 0;
        }

        .message p { margin: 0; }
        .message pre { 
            background: #1f2937; 
            color: #f3f4f6; 
            padding: 12px; 
            border-radius: 6px; 
            overflow-x: auto; 
            font-size: 13px;
        }

        /* Input Area */
        .chat-input-container {
            padding: 24px;
            background: white;
            border-top: 1px solid var(--border-color);
        }

        .chat-input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 12px;
        }

        .chat-input-wrapper input { 
            flex: 1; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .chat-input-wrapper input:focus { 
            border-color: var(--primary-color); 
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .chat-input-wrapper button {
            width: auto;
            padding: 0 24px;
            height: auto;
        }

        /* Status Indicators */
        .status-text { margin-top: 8px; font-size: 12px; color: #6b7280; text-align: center; }
        
        /* History List in Sidebar */
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .history-item {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #374151;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }
        .history-item:hover { background: #f3f4f6; }

    </style>
</head>
<body>
    <header>
        <h1>Code2Resume</h1>
        <nav>
            <span id="usernameDisplay"></span>
            <a href="/settings">Settings</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-section">
                <h2>Data Sync</h2>
                <p>Fetch your latest repositories from GitHub to update the AI.</p>
                <button class="primary" onclick="updateData()" id="updateBtn">Update from GitHub</button>
                <div id="status" class="status-text"></div>
            </div>

            <div class="sidebar-section">
                <h2>Model Training</h2>
                <p>Fine-tune Llama 3.1 on your RTX 2050.</p>
                <button class="primary" onclick="startFineTuning()" id="trainBtn">Start GPU Fine-Tuning</button>
                <div id="trainStatus" class="status-text"></div>
            </div>
            
            <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column;">
                <h2>Chat History</h2>
                <div style="flex: 1; overflow-y: auto;">
                    <ul class="history-list" id="historyList">
                        <!-- History items will be added here -->
                        <li class="history-item" style="color: #9ca3af; font-style: italic; cursor: default;">No previous chats</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="chat-box">
                <div class="chat-history" id="chatHistory">
                    <div class="message agent">
                        <div class="avatar">AI</div>
                        <div class="message-content">
                            <p>Hello! I've analyzed your GitHub projects. How can I help you with your resume or portfolio today?</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <input type="text" id="queryInput" placeholder="Ask something about your projects..." onkeypress="handleEnter(event)">
                    <button class="primary" onclick="askAgent()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        // Load history from local storage
        let sessionHistory = JSON.parse(localStorage.getItem('chatSessions')) || [];

        function saveSession(query) {
            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            sessionHistory.unshift({ query, timestamp });
            if (sessionHistory.length > 20) sessionHistory.pop(); // Keep last 20
            localStorage.setItem('chatSessions', JSON.stringify(sessionHistory));
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('historyList');
            if (sessionHistory.length === 0) return;
            
            list.innerHTML = sessionHistory.map(item => `
                <li class="history-item" title="${item.query}">
                    <span style="color: #9ca3af; font-size: 11px; margin-right: 6px;">${item.timestamp}</span>
                    ${item.query}
                </li>
            `).join('');
        }

        async function loadUser() {
            try {
                const response = await fetch('/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Unauthorized');
                const user = await response.json();
                document.getElementById('usernameDisplay').textContent = user.username;
            } catch (e) {
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        async function startFineTuning() {
            const btn = document.getElementById('trainBtn');
            const status = document.getElementById('trainStatus');
            
            btn.disabled = true;
            status.textContent = "Starting fine-tuning process...";
            
            try {
                const response = await fetch('/fine-tune', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.detail || 'Failed to start');
                
                status.textContent = "Training started in background! Check terminal.";
                status.style.color = "#059669"; // Green
            } catch (e) {
                status.textContent = "Error: " + e.message;
                status.style.color = "#dc2626"; // Red
                btn.disabled = false;
            }
        }

        async function updateData() {
            const btn = document.getElementById('updateBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.textContent = "Fetching repos...";
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({}) 
                });
                
                if (!response.ok) throw new Error('Analysis failed');
                
                const data = await response.json();
                status.textContent = `Success! Analyzed ${data.repos.length} repos.`;
                status.style.color = "#059669";
            } catch (e) {
                status.textContent = "Error: " + e.message;
                status.style.color = "#dc2626";
            } finally {
                btn.disabled = false;
            }
        }

        async function askAgent() {
            const input = document.getElementById('queryInput');
            const history = document.getElementById('chatHistory');
            const query = input.value.trim();
            
            if (!query) return;
            
            // Save to sidebar history
            saveSession(query);

            // Add user message
            history.innerHTML += `
                <div class="message user">
                    <div class="avatar">U</div>
                    <div class="message-content">
                        <p>${query}</p>
                    </div>
                </div>`;
            input.value = '';
            history.scrollTop = history.scrollHeight;

            // Add loading placeholder
            const loadingId = 'loading-' + Date.now();
            history.innerHTML += `
                <div class="message agent" id="${loadingId}">
                    <div class="avatar">AI</div>
                    <div class="message-content">
                        <p>Thinking...</p>
                    </div>
                </div>`;
            history.scrollTop = history.scrollHeight;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                const agentMsg = document.getElementById(loadingId);
                // Replace the content div only
                agentMsg.querySelector('.message-content').innerHTML = marked.parse(data.response);
            } catch (e) {
                const agentMsg = document.getElementById(loadingId);
                agentMsg.querySelector('.message-content').innerHTML = `<p style="color:#dc2626">Error: ${e.message}</p>`;
            }
            history.scrollTop = history.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') askAgent();
        }

        loadUser();
        renderHistoryList();
    </script>
</body>
</html>
